<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0e2a45"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a3a"/>
      <stop offset="100%" style="stop-color:#0e3228"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a5c"/>
      <stop offset="100%" style="stop-color:#280e45"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3a1a"/>
      <stop offset="100%" style="stop-color:#352a0e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4aff9e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a94aff"/>
    </marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffd94a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b4a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="620"/>
    <line x1="300" y1="0" x2="300" y2="620"/>
    <line x1="500" y1="0" x2="500" y2="620"/>
    <line x1="700" y1="0" x2="700" y2="620"/>
  </g>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold" letter-spacing="3" filter="url(#softGlow)">TRACK INSIGHT</text>
  <text x="450" y="56" text-anchor="middle" fill="#4a9eff" font-size="10" letter-spacing="5">SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="65" x2="700" y2="65" stroke="#4a9eff" stroke-width="0.5" opacity="0.5"/>

  <!-- ── FRONTEND ── -->
  <rect x="30" y="90" width="160" height="70" rx="6" fill="url(#frontendGrad)" stroke="#4a9eff" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="110" y="114" text-anchor="middle" fill="#4a9eff" font-size="9" letter-spacing="2">FRONTEND</text>
  <text x="110" y="132" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Vue.js</text>
  <text x="110" y="149" text-anchor="middle" fill="#8ab8d4" font-size="8">:3000</text>

  <!-- ── JS BACKEND ── -->
  <rect x="270" y="90" width="160" height="70" rx="6" fill="url(#backendGrad)" stroke="#4aff9e" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="350" y="114" text-anchor="middle" fill="#4aff9e" font-size="9" letter-spacing="2">JS BACKEND</text>
  <text x="350" y="132" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Node.js / Express</text>
  <text x="350" y="149" text-anchor="middle" fill="#8ad4b8" font-size="8">:5000</text>

  <!-- ── POSTGRES ── -->
  <rect x="270" y="490" width="160" height="70" rx="6" fill="url(#dbGrad)" stroke="#ffd94a" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="350" y="514" text-anchor="middle" fill="#ffd94a" font-size="9" letter-spacing="2">DATABASE</text>
  <text x="350" y="532" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">PostgreSQL</text>
  <text x="350" y="549" text-anchor="middle" fill="#d4c88a" font-size="8">+ pgvector</text>

  <!-- ── AGENT SERVICE outer box ── -->
  <rect x="510" y="80" width="360" height="460" rx="8" fill="none" stroke="#a94aff" stroke-width="1" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="690" y="100" text-anchor="middle" fill="#a94aff" font-size="9" letter-spacing="3">PYTHON AGENT SERVICE  :8000</text>

  <!-- ── COORDINATOR ── -->
  <rect x="570" y="115" width="240" height="60" rx="6" fill="url(#agentGrad)" stroke="#a94aff" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="690" y="139" text-anchor="middle" fill="#a94aff" font-size="9" letter-spacing="2">COORDINATOR</text>
  <text x="690" y="157" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Routes &amp; Orchestrates</text>

  <!-- ── ISSUE MANAGER ── -->
  <rect x="530" y="230" width="150" height="55" rx="5" fill="#1a0f2e" stroke="#7a4aff" stroke-width="1"/>
  <text x="605" y="251" text-anchor="middle" fill="#7a4aff" font-size="8" letter-spacing="1">ISSUE MANAGER</text>
  <text x="605" y="268" text-anchor="middle" fill="#ccbbff" font-size="10">Triage &amp; Query</text>
  <text x="605" y="280" text-anchor="middle" fill="#776699" font-size="7">→ DB tools</text>

  <!-- ── SEARCH AGENT ── -->
  <rect x="700" y="230" width="150" height="55" rx="5" fill="#1a0f2e" stroke="#7a4aff" stroke-width="1"/>
  <text x="775" y="251" text-anchor="middle" fill="#7a4aff" font-size="8" letter-spacing="1">SEARCH AGENT</text>
  <text x="775" y="268" text-anchor="middle" fill="#ccbbff" font-size="10">Google Search</text>
  <text x="775" y="280" text-anchor="middle" fill="#776699" font-size="7">→ web tools</text>

  <!-- ── RESOLUTION AGENT ── -->
  <rect x="530" y="340" width="150" height="55" rx="5" fill="#1a0f2e" stroke="#7a4aff" stroke-width="1"/>
  <text x="605" y="361" text-anchor="middle" fill="#7a4aff" font-size="8" letter-spacing="1">RESOLUTION</text>
  <text x="605" y="378" text-anchor="middle" fill="#ccbbff" font-size="10">Fix Planning</text>
  <text x="605" y="390" text-anchor="middle" fill="#776699" font-size="7">→ DB + Search</text>

  <!-- ── VALIDATOR ── -->
  <rect x="700" y="340" width="150" height="55" rx="5" fill="#1a0f2e" stroke="#ff4a9e" stroke-width="1"/>
  <text x="775" y="361" text-anchor="middle" fill="#ff4a9e" font-size="8" letter-spacing="1">VALIDATOR</text>
  <text x="775" y="378" text-anchor="middle" fill="#ffbbdd" font-size="10">Self-Correction</text>
  <text x="775" y="390" text-anchor="middle" fill="#996677" font-size="7">↺ retry loop</text>

  <!-- ── GITHUB SYNC ── -->
  <rect x="30" y="310" width="160" height="60" rx="6" fill="#1a1a0f" stroke="#ffd94a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="110" y="333" text-anchor="middle" fill="#ffd94a" font-size="9" letter-spacing="1">GITHUB SYNC</text>
  <text x="110" y="351" text-anchor="middle" fill="#d4d48a" font-size="10">Issues Mirror</text>
  <text x="110" y="364" text-anchor="middle" fill="#888855" font-size="7">fire &amp; forget</text>

  <!-- ── AWS INFRA ── -->
  <rect x="30" y="420" width="160" height="100" rx="6" fill="#1a0f0f" stroke="#ff6b4a" stroke-width="1"/>
  <text x="110" y="443" text-anchor="middle" fill="#ff6b4a" font-size="9" letter-spacing="1">AWS INFRA</text>
  <line x1="40" y1="450" x2="180" y2="450" stroke="#ff6b4a" stroke-width="0.5" opacity="0.4"/>
  <text x="110" y="466" text-anchor="middle" fill="#d4aa9a" font-size="9">ECS Fargate</text>
  <text x="110" y="481" text-anchor="middle" fill="#d4aa9a" font-size="9">EKS + Kubernetes</text>
  <text x="110" y="496" text-anchor="middle" fill="#d4aa9a" font-size="9">Terraform IaC</text>
  <text x="110" y="511" text-anchor="middle" fill="#776655" font-size="7">60+ resources</text>

  <!-- ── CI/CD ── -->
  <rect x="30" y="200" width="160" height="60" rx="6" fill="#0f1a1a" stroke="#4affff" stroke-width="1"/>
  <text x="110" y="223" text-anchor="middle" fill="#4affff" font-size="9" letter-spacing="1">CI / CD</text>
  <text x="110" y="241" text-anchor="middle" fill="#aaffff" font-size="10">GitHub Actions</text>
  <text x="110" y="254" text-anchor="middle" fill="#558888" font-size="7">126 tests</text>

  <!-- ARROWS -->
  <!-- Frontend → Backend -->
  <line x1="190" y1="125" x2="268" y2="125" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="229" y="118" text-anchor="middle" fill="#4a9eff" font-size="7">HTTP</text>

  <!-- Backend → Agent Service -->
  <line x1="430" y1="125" x2="568" y2="145" stroke="#a94aff" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="500" y="125" text-anchor="middle" fill="#a94aff" font-size="7">agent requests</text>

  <!-- Backend → Postgres -->
  <line x1="350" y1="160" x2="350" y2="488" stroke="#ffd94a" stroke-width="1.5" marker-end="url(#arrowGold)"/>
  <text x="362" y="330" fill="#ffd94a" font-size="7">SQL</text>

  <!-- Agent Service → Postgres -->
  <line x1="570" y1="490" x2="432" y2="525" stroke="#ffd94a" stroke-width="1.5" marker-end="url(#arrowGold)"/>
  <text x="510" y="500" text-anchor="middle" fill="#ffd94a" font-size="7">asyncpg</text>

  <!-- Coordinator → sub-agents -->
  <line x1="650" y1="175" x2="610" y2="228" stroke="#7a4aff" stroke-width="1" marker-end="url(#arrowPurple)" opacity="0.8"/>
  <line x1="730" y1="175" x2="760" y2="228" stroke="#7a4aff" stroke-width="1" marker-end="url(#arrowPurple)" opacity="0.8"/>
  <line x1="650" y1="175" x2="610" y2="338" stroke="#7a4aff" stroke-width="1" marker-end="url(#arrowPurple)" opacity="0.8"/>
  <line x1="730" y1="175" x2="760" y2="338" stroke="#ff4a9e" stroke-width="1" marker-end="url(#arrowPurple)" opacity="0.8"/>

  <!-- Backend → GitHub Sync -->
  <line x1="270" y1="200" x2="185" y2="330" stroke="#ffd94a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowGold)" opacity="0.6"/>

  <!-- CI/CD → Backend -->
  <line x1="190" y1="230" x2="270" y2="160" stroke="#4affff" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowBlue)" opacity="0.6"/>

  <!-- AWS Infra → Backend (hosts it) -->
  <line x1="110" y1="420" x2="300" y2="162" stroke="#ff6b4a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)" opacity="0.5"/>
  <text x="175" y="370" fill="#ff6b4a" font-size="7" transform="rotate(-55, 175, 370)">hosts</text>

  <!-- AWS Infra → Agent Service (hosts it) -->
  <line x1="190" y1="450" x2="568" y2="300" stroke="#ff6b4a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)" opacity="0.5"/>
  <text x="390" y="420" fill="#ff6b4a" font-size="7" transform="rotate(-25, 390, 420)">hosts</text>

  <!-- Legend -->
  <rect x="510" y="430" width="350" height="95" rx="4" fill="#0a0f1e" stroke="#333355" stroke-width="1" opacity="0.9"/>
  <text x="525" y="449" fill="#666688" font-size="8" letter-spacing="2">LEGEND</text>
  <line x1="525" y1="458" x2="545" y2="458" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="550" y="461" fill="#8899bb" font-size="8">HTTP / REST</text>
  <line x1="525" y1="472" x2="545" y2="472" stroke="#ffd94a" stroke-width="1.5"/>
  <text x="550" y="475" fill="#8899bb" font-size="8">Database connection</text>
  <line x1="525" y1="486" x2="545" y2="486" stroke="#a94aff" stroke-width="1.5"/>
  <text x="550" y="489" fill="#8899bb" font-size="8">Agent orchestration</text>
  <line x1="525" y1="500" x2="545" y2="500" stroke="#ffd94a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="550" y="503" fill="#8899bb" font-size="8">Async / fire &amp; forget</text>
  <line x1="660" y1="458" x2="680" y2="458" stroke="#ff4a9e" stroke-width="1.5"/>
  <text x="685" y="461" fill="#8899bb" font-size="8">Validator loop</text>
  <line x1="660" y1="472" x2="680" y2="472" stroke="#4affff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="685" y="475" fill="#8899bb" font-size="8">CI/CD pipeline</text>

  <!-- Footer -->
  <text x="450" y="606" text-anchor="middle" fill="#334455" font-size="8" letter-spacing="2">TRACK INSIGHT  ·  MULTI-AGENT AI PLATFORM  ·  AWS ECS / EKS  ·  GOOGLE ADK</text>
</svg>
